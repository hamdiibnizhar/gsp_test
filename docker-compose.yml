services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: gsp-postgres
    environment:
      POSTGRES_DB: gsp
      POSTGRES_USER: gsp
      POSTGRES_PASSWORD: gsp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsp -d gsp"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.2
    container_name: gsp-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    container_name: gsp-redis
    ports:
      - "6379:6379"

  rag-api:
    build: .
    container_name: gsp-rag-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./incoming_docs:/app/incoming_docs
      - ./processed_docs:/app/processed_docs
      - ./failed_docs:/app/failed_docs

  folder-watcher:
    build: .
    container_name: gsp-folder-watcher
    command: ["python", "-m", "src.streaming.watcher"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./incoming_docs:/app/incoming_docs
      - ./processed_docs:/app/processed_docs
      - ./failed_docs:/app/failed_docs

  kafka-ingester:
    build: .
    container_name: gsp-kafka-ingester
    command: ["python", "-m", "src.streaming.consumer"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./incoming_docs:/app/incoming_docs
      - ./processed_docs:/app/processed_docs
      - ./failed_docs:/app/failed_docs

volumes:
  postgres_data:
